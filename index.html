<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>profile card</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="profile-card">
      <div class="card">
        <div class="avatar">
          <img
            src="https://avatarfiles.alphacoders.com/280/thumb-350-280561.webp"
            alt="photo of mark grayson"
          />
        </div>

        <div class="card-content">
          <h2>Mark Grayson</h2>
          <p>New York, USA</p>

          <div class="card-stats">
            <div>
              <h4>1,2k</h4>
              <p>followers</p>
            </div>
            <div>
              <h4>318</h4>
              <p>following</p>
            </div>
          </div>
        </div>

        <div class="btn">
          <button class="chat-btn">Chat</button>
          <button class="follow-btn">Follow</button>
        </div>
      </div>
    </div>
  </body>
</html>
